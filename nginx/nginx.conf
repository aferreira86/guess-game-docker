# =============================================================
# nginx.conf - Proxy Reverso + Balanceamento de Carga
# =============================================================

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout 65;

    # -------------------------------------------------------
    # Upstream: define o pool de instâncias do backend Flask
    # O Docker Compose sobe 'backend' com --scale backend=2,
    # e o DNS interno do Docker resolve para todas as réplicas.
    # O método padrão é round-robin, que distribui as
    # requisições igualmente entre as instâncias.
    # -------------------------------------------------------
    upstream backend_pool {
        # least_conn distribui para o servidor com menos conexões ativas
        least_conn;

        server backend1:5000;
        server backend2:5000;
    }

    server {
        listen 80;
        server_name localhost;

        # -------------------------------------------------------
        # Servir o frontend React (arquivos estáticos)
        # -------------------------------------------------------
        location / {
            root   /usr/share/nginx/html;
            index  index.html index.htm;
            # Necessário para React Router funcionar com deep links
            try_files $uri $uri/ /index.html;
        }

        # -------------------------------------------------------
        # Proxy Reverso para o backend Flask
        # O frontend faz chamadas para /api/* que são
        # redirecionadas para o backend (sem o prefixo /api).
        # Ex: GET /api/health → GET http://backend_pool/health
        # -------------------------------------------------------
        location /api/ {
            proxy_pass         http://backend_pool/;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;

            # Timeouts
            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
        }
    }
}
